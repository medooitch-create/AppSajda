<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="App gratuita per orari preghiera islamica con Qibla">
    
    <title>AppSajda - Orari Preghiera</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕌%3C/text%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1f2937;
            --text-light: #6b7280;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: rgba(30, 41, 59, 0.95);
                --text: #f1f5f9;
                --text-light: #94a3b8;
            }
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #312e81 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding-top: env(safe-area-inset-top);
        }
        
        .location-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .location-btn:active {
            transform: scale(0.95);
        }
        
        .date-display {
            margin-top: 10px;
            opacity: 0.9;
            font-size: 14px;
        }
        
        .next-prayer-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .next-prayer-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .next-label {
            font-size: 14px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        .next-name {
            font-size: 42px;
            font-weight: 700;
            margin: 10px 0;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .arabic-name {
            font-family: 'Amiri', serif;
            font-size: 28px;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .countdown {
            font-size: 36px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }
        
        .prayers-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .prayer-item {
            background: var(--card);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .prayer-item.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--card), rgba(245, 158, 11, 0.1));
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.2);
        }
        
        .prayer-item.past {
            opacity: 0.6;
        }
        
        .prayer-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .prayer-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .prayer-item.active .prayer-icon {
            background: linear-gradient(135deg, var(--accent), #d97706);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.5); }
            50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.8); }
        }
        
        .prayer-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .prayer-info .arabic {
            font-family: 'Amiri', serif;
            font-size: 14px;
            color: var(--text-light);
        }
        
        .prayer-time {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .prayer-item.active .prayer-time {
            color: var(--accent);
        }
        
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .action-btn {
            background: var(--card);
            border: none;
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .action-btn span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }
        
        .qibla-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .qibla-container.active {
            display: flex;
        }
        
        .compass {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .compass-inner {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: white;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .compass-arrow {
            width: 4px;
            height: 100px;
            background: linear-gradient(to top, #ef4444, #f59e0b);
            position: absolute;
            top: 20px;
            border-radius: 2px;
            transform-origin: bottom center;
            transition: transform 0.3s ease-out;
        }
        
        .compass-arrow::after {
            content: '▲';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            color: #ef4444;
            font-size: 20px;
        }
        
        .compass-center {
            width: 20px;
            height: 20px;
            background: #1e3a8a;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }
        
        .qibla-info {
            margin-top: 30px;
            text-align: center;
        }
        
        .qibla-angle {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s;
            z-index: 100;
            max-width: 90%;
        }
        
        .install-prompt.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .install-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            display: none;
            z-index: 10000;
            max-width: 80%;
        }
        
        .error-message.show {
            display: block;
        }
        
        .retry-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h2>AppSajda</h2>
        <p>Caricamento orari preghiera...</p>
    </div>

    <div class="error-message" id="error-message">
        <h3>⚠️ Errore</h3>
        <p id="error-text">Impossibile caricare l'app</p>
        <button class="retry-btn" onclick="location.reload()">Riprova</button>
    </div>

    <div class="container">
        <header class="header">
            <button class="location-btn" onclick="getLocation()">
                <span>📍</span>
                <span id="location-text">Roma, Italia</span>
            </button>
            <div class="date-display" id="date-display"></div>
        </header>

        <div class="next-prayer-card">
            <div class="next-label">Prossima Preghiera</div>
            <div class="next-name" id="next-prayer-name">--</div>
            <div class="arabic-name" id="next-prayer-arabic">--</div>
            <div class="countdown" id="countdown">--:--:--</div>
        </div>

        <div class="prayers-list" id="prayers-list"></div>

        <div class="actions-grid">
            <button class="action-btn" onclick="showQibla()">
                <div class="action-icon">🧭</div>
                <span>Qibla</span>
            </button>
            <button class="action-btn" onclick="openQuran()">
                <div class="action-icon">📖</div>
                <span>Corano</span>
            </button>
            <button class="action-btn" onclick="toggleNotifications()">
                <div class="action-icon">🔔</div>
                <span>Notifiche</span>
            </button>
            <button class="action-btn" onclick="shareApp()">
                <div class="action-icon">📤</div>
                <span>Condividi</span>
            </button>
            <button class="action-btn" onclick="showInfo()">
                <div class="action-icon">ℹ️</div>
                <span>Info</span>
            </button>
        </div>
    </div>

    <div class="qibla-container" id="qibla-container">
        <button class="close-btn" onclick="hideQibla()">✕</button>
        <div class="compass">
            <div class="compass-inner">
                <div class="compass-arrow" id="compass-arrow"></div>
                <div class="compass-center"></div>
            </div>
        </div>
        <div class="qibla-info">
            <div class="qibla-angle" id="qibla-angle">--°</div>
            <p>Direzione della Qibla (Makka)</p>
        </div>
    </div>

    <div class="install-prompt" id="install-prompt">
        <div>
            <div style="font-weight:600;">Installa AppSajda</div>
            <div style="font-size:14px;color:var(--text-light);">Aggiungi alla Home</div>
        </div>
        <button class="install-btn" onclick="installApp()">Installa</button>
    </div>

    <script>
        // AppSajda - Versione semplificata e robusta
        (function() {
            'use strict';
            
            // Configurazione
            const CONFIG = {
                defaultLocation: { lat: 41.9028, lng: 12.4964, name: 'Roma, Italia' },
                prayers: [
                    { name: 'Fajr', arabic: 'الفجر', icon: '🌅', time: '' },
                    { name: 'Sunrise', arabic: 'الشروق', icon: '🌄', time: '' },
                    { name: 'Dhuhr', arabic: 'الظهر', icon: '☀️', time: '' },
                    { name: 'Asr', arabic: 'العصر', icon: '🌤️', time: '' },
                    { name: 'Maghrib', arabic: 'المغرب', icon: '🌇', time: '' },
                    { name: 'Isha', arabic: 'العشاء', icon: '🌙', time: '' }
                ]
            };
            
            let currentLocation = { ...CONFIG.defaultLocation };
            let prayerTimes = [];
            let qiblaAngle = 0;
            let deferredPrompt = null;
            
            // Inizializzazione immediata
            document.addEventListener('DOMContentLoaded', function() {
                try {
                    init();
                } catch (e) {
                    showError('Errore inizializzazione: ' + e.message);
                }
            });
            
            function init() {
                updateDate();
                loadSavedLocation();
                calculateAllTimes();
                renderPrayers();
                startCountdown();
                setupServiceWorker();
                setupInstallPrompt();
                
                // Nascondi loading dopo 1 secondo
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (loading) loading.classList.add('hidden');
                }, 1000);
            }
            
            function updateDate() {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const dateEl = document.getElementById('date-display');
                if (dateEl) {
                    dateEl.textContent = new Date().toLocaleDateString('it-IT', options);
                }
            }
            
            function loadSavedLocation() {
                try {
                    const saved = localStorage.getItem('appsajda_location');
                    if (saved) {
                        currentLocation = JSON.parse(saved);
                        const locText = document.getElementById('location-text');
                        if (locText) locText.textContent = currentLocation.name;
                    }
                } catch (e) {
                    console.log('Nessuna posizione salvata');
                }
            }
            
            function calculateAllTimes() {
                const date = new Date();
                const times = calculatePrayerTimes(currentLocation.lat, currentLocation.lng, date);
                
                CONFIG.prayers[0].time = times.fajr;
                CONFIG.prayers[1].time = times.sunrise;
                CONFIG.prayers[2].time = times.dhuhr;
                CONFIG.prayers[3].time = times.asr;
                CONFIG.prayers[4].time = times.maghrib;
                CONFIG.prayers[5].time = times.isha;
                
                qiblaAngle = calculateQibla(currentLocation.lat, currentLocation.lng);
                prayerTimes = [...CONFIG.prayers];
            }
            
            function calculatePrayerTimes(lat, lng, date) {
                // Algoritmo semplificato ma accurato
                const julianDate = getJulianDate(date);
                const n = julianDate - 2451545.0;
                
                // Longitudine media del sole
                const L = (280.460 + 0.9856474 * n) % 360;
                const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
                
                // Longitudine eclittica
                const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
                const epsilon = (23.439 - 0.0000004 * n) * Math.PI / 180;
                
                // Declinazione solare
                const declination = Math.asin(Math.sin(epsilon) * Math.sin(lambda));
                
                // Equazione del tempo
                const eqTime = 4 * (L - Math.atan2(Math.cos(epsilon) * Math.sin(lambda), Math.cos(lambda)) * 180 / Math.PI);
                
                // Calcoli orari
                const latRad = lat * Math.PI / 180;
                const hourAngle = Math.acos(-Math.tan(latRad) * Math.tan(declination));
                
                // Transit (mezzogiorno solare locale)
                const transitUTC = 12 + (lng * 4 - eqTime) / 60;
                
                // Conversione in ora locale (semplificata)
                const offset = date.getTimezoneOffset() / 60;
                const transit = transitUTC - offset;
                
                const sunrise = transit - (hourAngle * 180 / Math.PI) / 15;
                const sunset = transit + (hourAngle * 180 / Math.PI) / 15;
                
                // Calcolo Asr (ombra = ombra oggetto + altezza oggetto)
                const asrAngle = Math.atan(1 / (1 + Math.tan(Math.abs(latRad - declination))));
                const asrHourAngle = Math.acos((Math.sin(asrAngle) - Math.sin(latRad) * Math.sin(declination)) / 
                                    (Math.cos(latRad) * Math.cos(declination)));
                const asr = transit + (asrHourAngle * 180 / Math.PI) / 15;
                
                return {
                    fajr: adjustTime(sunrise, -90), // 90 minuti prima alba
                    sunrise: decimalToTime(sunrise),
                    dhuhr: decimalToTime(transit),
                    asr: decimalToTime(asr),
                    maghrib: decimalToTime(sunset),
                    isha: adjustTime(sunset, 75) // 75 minuti dopo tramonto
                };
            }
            
            function getJulianDate(date) {
                const a = Math.floor((14 - (date.getMonth() + 1)) / 12);
                const y = date.getFullYear() + 4800 - a;
                const m = (date.getMonth() + 1) + 12 * a - 3;
                return date.getDate() + Math.floor((153 * m + 2) / 5) + 365 * y + 
                       Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
            }
            
            function decimalToTime(decimal) {
                let hours = Math.floor(decimal);
                let minutes = Math.floor((decimal - hours) * 60);
                
                if (hours < 0) hours += 24;
                if (hours >= 24) hours -= 24;
                
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }
            
            function adjustTime(baseTimeDecimal, minutes) {
                const adjusted = baseTimeDecimal + (minutes / 60);
                return decimalToTime(adjusted);
            }
            
            function calculateQibla(lat, lng) {
                const makkahLat = 21.4225 * Math.PI / 180;
                const makkahLng = 39.8262 * Math.PI / 180;
                const latRad = lat * Math.PI / 180;
                const lngRad = lng * Math.PI / 180;
                
                const y = Math.sin(makkahLng - lngRad);
                const x = Math.cos(latRad) * Math.tan(makkahLat) - Math.sin(latRad) * Math.cos(makkahLng - lngRad);
                
                let angle = Math.atan2(y, x) * 180 / Math.PI;
                return (angle + 360) % 360;
            }
            
            function renderPrayers() {
                const container = document.getElementById('prayers-list');
                if (!container) return;
                
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                
                // Trova prossima preghiera
                let nextIndex = -1;
                let minDiff = Infinity;
                
                prayerTimes.forEach((prayer, index) => {
                    if (prayer.name === 'Sunrise') return;
                    
                    const [h, m] = prayer.time.split(':').map(Number);
                    const prayerMinutes = h * 60 + m;
                    const diff = prayerMinutes - currentMinutes;
                    
                    if (diff > 0 && diff < minDiff) {
                        minDiff = diff;
                        nextIndex = index;
                    }
                });
                
                if (nextIndex === -1) nextIndex = 0; // Domani Fajr
                
                // Aggiorna card prossima preghiera
                const nextPrayer = prayerTimes[nextIndex];
                const nameEl = document.getElementById('next-prayer-name');
                const arabicEl = document.getElementById('next-prayer-arabic');
                
                if (nameEl) nameEl.textContent = nextPrayer.name;
                if (arabicEl) arabicEl.textContent = nextPrayer.arabic;
                
                // Render lista
                container.innerHTML = prayerTimes.map((prayer, index) => {
                    const [h, m] = prayer.time.split(':').map(Number);
                    const prayerMinutes = h * 60 + m;
                    const isPast = prayerMinutes < currentMinutes && index !== nextIndex;
                    const isNext = index === nextIndex;
                    
                    return `
                        <div class="prayer-item ${isNext ? 'active' : ''} ${isPast ? 'past' : ''}">
                            <div class="prayer-left">
                                <div class="prayer-icon">${prayer.icon}</div>
                                <div class="prayer-info">
                                    <h3>${prayer.name}</h3>
                                    <div class="arabic">${prayer.arabic}</div>
                                </div>
                            </div>
                            <div class="prayer-time">${prayer.time}</div>
                        </div>
                    `;
                }).join('');
            }
            
            function startCountdown() {
                setInterval(() => {
                    const now = new Date();
                    const nextName = document.getElementById('next-prayer-name');
                    if (!nextName || nextName.textContent === '--') return;
                    
                    const nextPrayer = prayerTimes.find(p => p.name === nextName.textContent);
                    if (!nextPrayer) return;
                    
                    const [h, m] = nextPrayer.time.split(':').map(Number);
                    const nextTime = new Date();
                    nextTime.setHours(h, m, 0);
                    
                    if (nextTime < now) nextTime.setDate(nextTime.getDate() + 1);
                    
                    const diff = nextTime - now;
                    const hours = Math.floor(diff / 3600000);
                    const minutes = Math.floor((diff % 3600000) / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    
                    const countdownEl = document.getElementById('countdown');
                    if (countdownEl) {
                        countdownEl.textContent = 
                            `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                    }
                }, 1000);
            }
            
            function setupServiceWorker() {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('service-worker.js')
                        .then(() => console.log('SW registrato'))
                        .catch(err => console.log('SW errore:', err));
                }
            }
            
            function setupInstallPrompt() {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    setTimeout(() => {
                        const prompt = document.getElementById('install-prompt');
                        if (prompt) prompt.classList.add('show');
                    }, 3000);
                });
            }
            
            function showError(message) {
                console.error(message);
                const errorEl = document.getElementById('error-message');
                const errorText = document.getElementById('error-text');
                if (errorEl) errorEl.classList.add('show');
                if (errorText) errorText.textContent = message;
            }
            
            // Esponi funzioni globali
            window.getLocation = function() {
                if (!navigator.geolocation) {
                    alert('Geolocalizzazione non supportata');
                    return;
                }
                
                const locText = document.getElementById('location-text');
                if (locText) locText.textContent = 'Localizzazione...';
                
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        try {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            
                            // Tenta di ottenere il nome della città
                            let cityName = 'Posizione attuale';
                            try {
                                const response = await fetch(
                                    `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=it`
                                );
                                const data = await response.json();
                                cityName = data.city || data.locality || data.principalSubdivision || 'Posizione attuale';
                            } catch (e) {
                                console.log('API geocoding non disponibile');
                            }
                            
                            currentLocation = { lat, lng, name: cityName };
                            localStorage.setItem('appsajda_location', JSON.stringify(currentLocation));
                            
                            if (locText) locText.textContent = cityName;
                            
                            // Ricalcola e aggiorna
                            calculateAllTimes();
                            renderPrayers();
                            
                        } catch (error) {
                            if (locText) locText.textContent = 'Errore localizzazione';
                        }
                    },
                    (error) => {
                        if (locText) locText.textContent = currentLocation.name;
                        alert('Impossibile ottenere la posizione. Usando posizione default.');
                    }
                );
            };
            
            window.showQibla = function() {
                const container = document.getElementById('qibla-container');
                const angleEl = document.getElementById('qibla-angle');
                
                if (container) container.classList.add('active');
                if (angleEl) angleEl.textContent = Math.round(qiblaAngle) + '°';
                
                // Orientamento bussola
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', function handler(e) {
                        let heading = e.webkitCompassHeading || (360 - e.alpha);
                        if (heading) {
                            const rotation = qiblaAngle - heading;
                            const arrow = document.getElementById('compass-arrow');
                            if (arrow) arrow.style.transform = `rotate(${rotation}deg)`;
                        }
                    });
                }
            };
            
            window.hideQibla = function() {
                const container = document.getElementById('qibla-container');
                if (container) container.classList.remove('active');
            };
            
            window.openQuran = function() {
                window.open('https://quran.com/it', '_blank');
            };
            
            window.toggleNotifications = function() {
                if ('Notification' in window) {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            alert('Notifiche attivate!');
                        } else {
                            alert('Notifiche bloccate. Attivalle dalle impostazioni del browser.');
                        }
                    });
                } else {
                    alert('Notifiche non supportate su questo dispositivo');
                }
            };
            
            window.shareApp = function() {
                if (navigator.share) {
                    navigator.share({
                        title: 'AppSajda',
                        text: 'App gratuita per orari preghiera islamica',
                        url: window.location.href
                    }).catch(() => {});
                } else {
                    // Copia negli appunti
                    navigator.clipboard.writeText(window.location.href).then(() => {
                        alert('Link copiato negli appunti!');
                    }).catch(() => {
                        prompt('Copia questo link:', window.location.href);
                    });
                }
            };
            
            window.showInfo = function() {
                alert('AppSajda v1.0\n\nApp gratuita per la comunità musulmana\n✅ Orari preghiera precisi\n✅ Direzione Qibla\n✅ Funziona offline\n\nGratuita per tutti 🕌');
            };
            
            window.installApp = function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            const prompt = document.getElementById('install-prompt');
                            if (prompt) prompt.classList.remove('show');
                        }
                        deferredPrompt = null;
                    });
                } else {
                    // Istruzioni manuali per iOS
                    if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                        alert('Per installare su iPhone:\n1. Tappa il pulsante Condividi in Safari\n2. Scorri giù e seleziona "Aggiungi alla Home"');
                    } else {
                        alert('Installazione non disponibile. Aggiungi questa pagina ai preferiti!');
                    }
                }
            };
            
        })();
    </script>
</body>
</html>
